# === 无线 Split 核心 ===
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE_ROLE_CENTRAL=y

# === 省电：关掉 OLED、RGB、背光 ===
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_BACKLIGHT=n

# === 省电：降低扫描频率 ===
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# === USB 充电支持 ===
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# === 键盘底层参数 ===
CONFIG_KSCAN_DIRECT_POLLING=y
